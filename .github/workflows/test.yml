name: test

# claude-code-core is a shared library consumed by ross/joanne/personal-agent.
# Until now the only PR check was GitHub's default CodeQL build (it compiles the
# code but never runs `go test`), so a green check did NOT mean the tests passed
# — they were only ever run by hand before a merge. This workflow closes that
# gap: build, vet, and the full race-enabled test suite on every PR and push.
# The session queue is concurrency-heavy, so -race is non-negotiable here.

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test -race -count=1 ./...
